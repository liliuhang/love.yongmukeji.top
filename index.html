<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting...</title>
    <link rel="icon" href="https://hive.forms.usercontent.microsoft/Images/9188040d-6c67-4c5b-b112-36a304b66dad/00000000-0000-0000-0003-bffd409131bf/T0RRH45M4BJGVXSCOEE2GS5JAZ/ee97e1d6-f35d-4b36-8b84-3c00cd901cab" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 400px;
            text-align: center;
            color: #8b7355;
            line-height: 1.8;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #8b6f47;
            font-size: 1.1em;
        }

        .modal-content p {
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .modal-btn {
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb6c1 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.5);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 105, 180, 0.5);
            border-radius: 50%;
            animation: float 8s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 30px 20px;
            max-width: 90%;
            width: 600px;
            display: none;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-text {
            font-size: 1.5em;
            color: #8b6f47;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: glow 3s ease-in-out infinite;
            overflow: hidden;
            border-right: 3px solid #ffb6c1;
            display: inline-block;
            text-align: center;
            width: 100%;
            white-space: normal;
            line-height: 1.6;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
            50% { text-shadow: 0 0 20px rgba(255, 192, 203, 0.5); }
        }

        @keyframes blink {
            0%, 100% { border-color: #ffb6c1; }
            50% { border-color: transparent; }
        }

        .main-text.typing {
            animation: typing 4s steps(40) forwards, blink 0.7s step-end infinite, glow 3s ease-in-out infinite;
        }

        .sub-text {
            font-size: 1em;
            color: #6b5b4f;
            margin: 20px 0;
            line-height: 1.8;
            animation: slideUp 1s ease-out 0.5s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .waiting {
            font-size: 1.1em;
            color: #7b6f5f;
            margin: 25px 0;
            font-style: italic;
            animation: slideLeft 1s ease-out 1s both;
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .deadline {
            font-size: 0.55em;
            color: #b0a898;
            margin-top: 40px;
            opacity: 0.4;
            animation: slideRight 1s ease-out 1.5s both;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: none;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb6c1 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
            transition: all 0.3s;
            font-size: 1.3em;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.6);
        }

        .music-btn.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(255, 182, 193, 0.8); }
        }

        .copyright {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.7em;
            background: rgba(219, 184, 154, 0.3);
            padding: 10px;
            backdrop-filter: blur(5px);
            display: none;
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3>温馨提示</h3>
            <p>本网页由用户上传并由昆象云科技托管、展示，我司已尽力保证内容合法合规性，但相关内容不代表我司立场，敬请注意！</p>
            <button class="modal-btn" id="confirmBtn">确定</button>
        </div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container" id="mainContent">
        <div class="main-text" id="mainText">
            Something beautiful is about to happen...
        </div>
        
        <div class="sub-text">
            你问是什么？我们也不知道。但是，总有一天，你会知道的~
        </div>
        
        <div class="waiting">
            让我们一起等待吧~
        </div>
        
        <div class="deadline">
            before the end of November 2026
        </div>
    </div>

    <div class="music-control" id="musicControl">
        <button class="music-btn playing" id="musicBtn" title="音乐控制">
            🎵
        </button>
        <audio id="bgMusic" loop>
            <source src="wait.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="copyright" id="copyright">
        版权所有©这个网页的版权不归昆象云所有就对了🫡 2026-loading...（别等加载了，设计就这样😅）
    </div>

    <script>
        document.getElementById('confirmBtn').addEventListener('click', function() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('musicControl').style.display = 'block';
            document.getElementById('copyright').style.display = 'block';
            
            createParticles();
            typewriterEffect();
            
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.play().catch(e => console.log('自动播放被阻止'));
        });

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 6) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function typewriterEffect() {
            const text = "Something beautiful is about to happen...";
            const element = document.getElementById('mainText');
            element.textContent = '';
            element.classList.add('typing');
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        element.classList.remove('typing');
                    }, 1000);
                }
            }, 80);
        }

        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = true;

        musicBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.textContent = '⏸️';
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play();
                musicBtn.textContent = '🎵';
                musicBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
